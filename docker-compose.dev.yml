version: "3.9"

services:
  # ─── PostgreSQL ───────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: bus_ticketing_db_dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-bus_ticketing_dev}
    ports:
      - "5432:5432" # Exposed so you can connect via TablePlus / DBeaver
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    networks:
      - bus_network_dev
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-bus_ticketing_dev}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Express API (hot reload) ─────────────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.dev
    container_name: bus_ticketing_api_dev
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 4000
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-bus_ticketing_dev}
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-bus_ticketing_dev}
    ports:
      - "4000:4000" # Direct access for debugging / Postman
    volumes:
      - ./apps/api/src:/app/apps/api/src:delegated # Hot reload
      - ./packages/types/src:/app/packages/types/src:delegated
    depends_on:
      db:
        condition: service_healthy
    networks:
      - bus_network_dev

  # ─── Next.js Web (hot reload) ─────────────────────────────────
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile.dev
    container_name: bus_ticketing_web_dev
    restart: unless-stopped
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:4000
      WATCHPACK_POLLING: "true" # Required for hot reload in Docker
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web/src:/app/apps/web/src:delegated # Hot reload
      - ./apps/web/public:/app/apps/web/public:delegated
      - ./packages/types/src:/app/packages/types/src:delegated
    depends_on:
      - api
    networks:
      - bus_network_dev

volumes:
  postgres_data_dev:

networks:
  bus_network_dev:
    driver: bridge
